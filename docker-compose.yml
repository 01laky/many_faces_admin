services:
  # Development server
  admin-demo-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: admin-demo-dev
    ports:
      - '8082:8081'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.yarn/cache
      - /app/.pnp.cjs
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - VITE_API_HTTPS_URL=${VITE_API_HTTPS_URL:-https://localhost:8001}
      - VITE_APP_NAME=${VITE_APP_NAME:-Many Faces Admin}
      - VITE_APP_VERSION=${VITE_APP_VERSION:-1.0.0}
      - VITE_PORT=${VITE_PORT:-8081}
      - PORT=8081
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - admin-demo-network

  # Production server
  admin-demo-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin-demo-prod
    ports:
      - '8080:80'
    restart: unless-stopped
    networks:
      - admin-demo-network
    profiles:
      - production

networks:
  admin-demo-network:
    driver: bridge
